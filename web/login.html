<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ — NAT888</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-bg"></div>

  <div class="auth-container">

    <!-- Logo -->
    <a href="index.html" class="auth-logo">NAT888</a>
    <p class="auth-tagline">ร้านสุ่มไอดีเกมอันดับ 1</p>

    <!-- Card -->
    <div class="auth-card">
      <h2 class="auth-title">เข้าสู่ระบบ</h2>
      <p class="auth-sub">ยินดีต้อนรับกลับมา 👋</p>

      <div class="alert" id="alert"></div>

      <form id="loginForm" autocomplete="off">

        <div class="form-group">
          <label>ชื่อผู้ใช้ หรือ อีเมล</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="loginIdentifier" placeholder="กรอกชื่อผู้ใช้หรืออีเมล" required />
          </div>
        </div>

        <div class="form-group">
          <label>รหัสผ่าน</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="กรอกรหัสผ่าน" required />
            <button type="button" class="toggle-pw" id="togglePw">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <span>เข้าสู่ระบบ</span>
        </button>

      </form>

      <div class="auth-divider"><span>หรือ</span></div>

      <p class="auth-switch">
        ยังไม่มีบัญชี?
        <a href="register.html">สมัครสมาชิกฟรี →</a>
      </p>
    </div>

    <p class="auth-back"><a href="index.html">← กลับหน้าหลัก</a></p>

  </div>

  <script src="auth.js"></script>
  <script>
    // Toggle password
    document.getElementById("togglePw").addEventListener("click", function() {
      const pw = document.getElementById("loginPassword");
      pw.type = pw.type === "password" ? "text" : "password";
      this.textContent = pw.type === "password" ? "👁" : "🙈";
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const identifier = document.getElementById("loginIdentifier").value.trim();
      const password   = document.getElementById("loginPassword").value;
      const btn        = document.getElementById("loginBtn");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

      setTimeout(() => {
        const result = Auth.login(identifier, password);
        if (result.success) {
          showAlert("เข้าสู่ระบบสำเร็จ! กำลังพาไปหน้าหลัก...", "success");
          setTimeout(() => window.location.href = "index.html", 1000);
        } else {
          showAlert(result.message, "error");
          btn.disabled = false;
          btn.innerHTML = "<span>เข้าสู่ระบบ</span>";
        }
      }, 600);
    });
  </script>
</body>
</html>
